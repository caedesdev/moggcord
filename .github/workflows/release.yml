name: Build & Release Moggcord

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer
        run: pnpm buildStandalone

      - name: Package Moggcord dist
        shell: pwsh
        run: |
          node scripts/build/collect-assets.mjs
          Remove-Item "dist\desktop\*.map","dist\desktop\*.LEGAL.txt" -Force -ErrorAction SilentlyContinue
          node scripts/build/verify-dist.mjs
          New-Item -ItemType Directory -Path "release\installer" -Force | Out-Null
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::CreateFromDirectory(
            (Resolve-Path "dist\desktop").Path,
            (Resolve-Path "release\installer").Path + "\moggcord-dist.zip",
            [System.IO.Compression.CompressionLevel]::Optimal,
            $false
          )
          Copy-Item "release\installer\moggcord-dist.zip" "installer-src\moggcord-dist.zip" -Force
          Write-Host "moggcord-dist.zip created ($([Math]::Round((Get-Item release\installer\moggcord-dist.zip).Length / 1MB, 2)) MB)"

      - name: Build installer
        shell: pwsh
        run: |
          dotnet publish "installer-src\MoggcordInstaller.csproj" `
            -c Release `
            -o "release\installer" `
            --nologo `
            -p:PublishSingleFile=true `
            -p:SelfContained=false `
            -r win-x64

      - name: Create version metadata
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $meta = [ordered]@{
            version = $version
            releaseDate = (Get-Date -Format "yyyy-MM-dd")
            installerUrl = "https://github.com/caedesdev/moggcord/releases/latest/download/Moggcord-Installer.exe"
            distUrl = "https://github.com/caedesdev/moggcord/releases/latest/download/moggcord-dist.zip"
            downloadUrl = "https://github.com/caedesdev/moggcord/releases/latest/download/desktop.asar"
            moggcordAsarUrl = "https://github.com/caedesdev/moggcord/releases/latest/download/Moggcord.asar"
            changelog = "Moggcord $version"
          }
          $meta | ConvertTo-Json | Set-Content "release\installer\version.json"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/installer/Moggcord-Installer.exe
            release/installer/moggcord-dist.zip
            release/installer/version.json
            dist/desktop.asar
            dist/moggcord.asar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
